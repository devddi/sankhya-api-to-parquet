id: sankhya_to_parquet
namespace: pluralmed.data
description: Pipeline para extração de dados do Sankhya e conversão para Parquet no S3

tasks:
  - id: extract_and_convert
    type: io.kestra.plugin.scripts.python.Script
    containerImage: ghcr.io/kestra-io/pydata:latest
    beforeCommands:
      - echo "Iniciando ambiente Python..."
    env:
      SANKHYA_API_URL: "{{ kv('SANKHYA_API_URL') }}"
      SANKHYA_TOKEN: "{{ kv('SANKHYA_TOKEN') }}"
      AWS_ACCESS_KEY_ID: "{{ kv('AWS_ACCESS_KEY_ID') }}"
      AWS_SECRET_ACCESS_KEY: "{{ kv('AWS_SECRET_ACCESS_KEY') }}"
      AWS_BUCKET_NAME: "{{ kv('AWS_BUCKET_NAME') }}"
      AWS_REGION: "{{ kv('AWS_REGION') }}"
      # Configurações opcionais
      PAGE_SIZE: "2000"
      SLEEP_BETWEEN: "30"
      MAX_RETRIES: "20"
    script: |
      import os
      import sys
      import subprocess
      import urllib.request

      # --- CONFIGURAÇÃO DO REPOSITÓRIO ---
      # Substitua pela URL da 'raw' do seu arquivo no novo repositório
      GITHUB_REPO_URL = "https://raw.githubusercontent.com/devddi/sankhya-api-to-parquet/main"
      SCRIPT_NAME = "to_parquet.py"
      REQS_NAME = "requirements.txt"

      def download_file(filename):
          url = f"{GITHUB_REPO_URL}/{filename}"
          print(f"Baixando {filename} de: {url}")
          try:
              urllib.request.urlretrieve(url, filename)
              print(f"✅ {filename} baixado com sucesso!")
          except Exception as e:
              print(f"❌ Erro ao baixar {filename}: {e}")
              sys.exit(1)

      # Baixa os arquivos necessários
      download_file(REQS_NAME)
      download_file(SCRIPT_NAME)

      # Instala dependências agora que o arquivo existe
      print("Instalando dependências do requirements.txt...")
      subprocess.check_call([sys.executable, "-m", "pip", "install", "-r", REQS_NAME])
      
      # Executa o script principal
      print(f"Iniciando execução do {SCRIPT_NAME}...")
      subprocess.check_call([sys.executable, SCRIPT_NAME])

triggers:
  - id: webhook_trigger
    type: io.kestra.plugin.core.trigger.Webhook
    # Chave para autenticação do webhook. Você pode alterá-la para algo mais complexo.
    key: "SANKHYA_EXTRACT_KEY"

